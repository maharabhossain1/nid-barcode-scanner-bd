# Local development — hot reload, debug logging, no resource caps
# Usage: docker compose up --build
services:
  barcode-scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nid-scanner-local
    ports:
      - "8000:8000"
    volumes:
      - ./main.py:/app/main.py:ro
      - ./app:/app/app:ro
    environment:
      LOG_LEVEL: DEBUG
      THREAD_WORKERS: "2"
    command:
      - python
      - -m
      - uvicorn
      - main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --reload
    restart: "no"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  default:
    name: nid-scanner-local
